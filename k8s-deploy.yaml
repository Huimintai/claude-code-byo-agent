# =============================================================================
# Claude Code BYO Agent - Complete K8s Deployment
# =============================================================================
# Components:
#   1. Secret: sap-ai-proxy credentials
#   2. sap-ai-proxy Deployment + Service (in-cluster model routing)
#   3. Claude Code BYO Agent CRD
#
# Deploy: kubectl apply -f k8s-deploy.yaml -n dbci-agent
# =============================================================================

# =============================================================================
# 1. Secret for sap-ai-proxy
# =============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: sap-ai-proxy-secret
  namespace: dbci-agent
type: Opaque
stringData:
  AICORE_CLIENT_ID: "<YOUR_AICORE_CLIENT_ID>"
  AICORE_CLIENT_SECRET: "<YOUR_AICORE_CLIENT_SECRET>"
  AICORE_AUTH_URL: "<YOUR_AICORE_AUTH_URL>"
  AICORE_BASE_URL: "<YOUR_AICORE_BASE_URL>"
  AICORE_RESOURCE_GROUP: "default"

# =============================================================================
# 2. sap-ai-proxy Deployment + Service
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sap-ai-proxy
  namespace: dbci-agent
  labels:
    app: sap-ai-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sap-ai-proxy
  template:
    metadata:
      labels:
        app: sap-ai-proxy
    spec:
      containers:
        - name: sap-ai-proxy
          image: huimin123/sap-ai-proxy:v1
          ports:
            - containerPort: 3030
          envFrom:
            - secretRef:
                name: sap-ai-proxy-secret
          env:
            - name: NODE_ENV
              value: "deployment"
            - name: PORT
              value: "3030"
            - name: HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 3030
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 3030
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sap-ai-proxy
  namespace: dbci-agent
spec:
  selector:
    app: sap-ai-proxy
  ports:
    - port: 3030
      targetPort: 3030
  type: ClusterIP

# =============================================================================
# 3. Claude Code BYO Agent (claude-code-agent)
# =============================================================================
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: claude-code-agent
  namespace: dbci-agent
spec:
  type: BYO
  description: "K8s and CI/CD operations agent powered by Claude Code CLI"
  byo:
    deployment:
      image: huimin123/claude-code-byo-agent:v24
      env:
        - name: ANTHROPIC_BASE_URL
          value: "http://sap-ai-proxy.dbci-agent.svc.cluster.local:3030"
        - name: ANTHROPIC_API_KEY
          value: "not-needed-proxy-handles-auth"
        - name: AGENT_NAME
          value: "claude_code_agent"
        - name: AGENT_DESCRIPTION
          value: "K8s and CI/CD operations agent powered by Claude Code"
        - name: CLAUDE_MODEL
          value: "claude-sonnet-4-5-20250929"
        - name: PORT
          value: "8080"
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-mcp-pat
              key: GITHUB_PERSONAL_ACCESS_TOKEN
        - name: HANA_HOST
          valueFrom:
            secretKeyRef:
              name: bastion-ci-credentials
              key: HANA_DB_ADDRESS
        - name: HANA_PORT
          valueFrom:
            secretKeyRef:
              name: bastion-ci-credentials
              key: HANA_DB_PORT
        - name: HANA_USER
          valueFrom:
            secretKeyRef:
              name: bastion-ci-credentials
              key: HANA_DB_USER
        - name: HANA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bastion-ci-credentials
              key: HANA_DB_PASSWORD
        - name: JIRA_URL
          valueFrom:
            secretKeyRef:
              name: bastion-ci-credentials
              key: JIRA_URL
        - name: JIRA_TOKEN
          valueFrom:
            secretKeyRef:
              name: bastion-ci-credentials
              key: JIRA_TOKEN
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
        limits:
          memory: "1Gi"
          cpu: "1000m"
